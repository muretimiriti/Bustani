apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: git-clone
  namespace: default
spec:
  description: Clone a repository from git URL
  params:
  - name: url
    type: string
    description: Repository URL to clone
  - name: revision
    type: string
    description: Git revision (branch, tag, or commit)
    default: main
  - name: depth
    type: string
    description: Shallow clone depth
    default: "0"
  workspaces:
  - name: output
    description: The git repo will be cloned onto the output workspace
  steps:
  - name: clone
    image: gcr.io/tekton-releases/github.com/tektoncd/pipeline/cmd/git-init:v0.48.0
    env:
    - name: PARAM_URL
      value: $(params.url)
    - name: PARAM_REVISION
      value: $(params.revision)
    - name: PARAM_DEPTH
      value: $(params.depth)
    - name: WORKSPACE_OUTPUT_PATH
      value: $(workspaces.output.path)
    script: |
      set -e
      if [ "${PARAM_DEPTH}" != "0" ]; then
        git clone --depth "${PARAM_DEPTH}" --branch "${PARAM_REVISION}" "${PARAM_URL}" "${WORKSPACE_OUTPUT_PATH}"
      else
        git clone --branch "${PARAM_REVISION}" "${PARAM_URL}" "${WORKSPACE_OUTPUT_PATH}"
      fi
