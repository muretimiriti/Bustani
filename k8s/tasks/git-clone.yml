apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: git-clone
  namespace: default
spec:
  description: Clone a repository from git URL
  params:
  - name: url
    type: string
    description: Repository URL to clone
  - name: revision
    type: string
    description: Git revision (branch, tag, or commit)
    default: main
  - name: username
    type: string
    description: GitHub username/owner associated with the repository URL
  - name: depth
    type: string
    description: Shallow clone depth
    default: "0"
  workspaces:
  - name: output
    description: The git repo will be cloned onto the output workspace
  steps:
  - name: clone
    image: alpine/git:2.45.2
    env:
    - name: PARAM_URL
      value: $(params.url)
    - name: PARAM_REVISION
      value: $(params.revision)
    - name: PARAM_USERNAME
      value: $(params.username)
    - name: PARAM_DEPTH
      value: $(params.depth)
    - name: WORKSPACE_OUTPUT_PATH
      value: $(workspaces.output.path)
    # HOME must point to a writable dir so git can write .gitconfig / .ssh/known_hosts
    - name: HOME
      value: /tekton/home
    - name: GIT_TERMINAL_PROMPT
      value: "0"
    script: |
      set -e

      # Prevent interactive prompts in CI and keep logs explicit.
      git config --global safe.directory "${WORKSPACE_OUTPUT_PATH}"
      git config --global user.name "${PARAM_USERNAME}"

      echo "Using git username: ${PARAM_USERNAME}"

      if ! git ls-remote "${PARAM_URL}" >/dev/null 2>&1; then
        echo "ERROR: Repository is not accessible without credentials: ${PARAM_URL}"
        echo "If this repo is private, provide GIT_USERNAME and GIT_TOKEN when starting the pipeline."
        exit 128
      fi

      if [ "${PARAM_DEPTH}" != "0" ]; then
        git clone --depth "${PARAM_DEPTH}" --branch "${PARAM_REVISION}" "${PARAM_URL}" "${WORKSPACE_OUTPUT_PATH}"
      else
        git clone --branch "${PARAM_REVISION}" "${PARAM_URL}" "${WORKSPACE_OUTPUT_PATH}"
      fi

      cd "${WORKSPACE_OUTPUT_PATH}"
      echo "Cloned commit: $(git log --oneline -1)"
