apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: trivy-scan
  namespace: default
spec:
  description: Scan container images and filesystems for vulnerabilities with Trivy
  params:
  - name: scan-target
    type: string
    description: Scan target (container image for image scan, path for fs scan)
    default: ""
  - name: image
    type: string
    description: Backward-compatible alias for image target
    default: ""
  - name: scan-type
    type: string
    description: Type of scan - image or fs (filesystem)
    default: image
  - name: severity
    type: string
    description: Severities to report (CRITICAL,HIGH,MEDIUM,LOW)
    default: CRITICAL,HIGH
  - name: format
    type: string
    description: Output format - json, sarif, or table
    default: table
  - name: exit-code
    type: string
    description: Exit code when vulnerabilities found (0 or 1)
    default: "0"
  workspaces:
  - name: source
    description: Source workspace for filesystem scanning
  results:
  - name: scan-result
    description: Vulnerability scan result
    type: string
  steps:
  - name: trivy-scan
    image: aquasec/trivy:latest
    script: |
      TARGET="$(params.scan-target)"
      if [ -z "$TARGET" ]; then
        TARGET="$(params.image)"
      fi
      if [ "$(params.scan-type)" = "fs" ] && [ -z "$TARGET" ]; then
        TARGET="$(workspaces.source.path)"
      fi

      if [ -z "$TARGET" ]; then
        echo "No trivy scan target was provided"
        exit 1
      fi

      set +e
      
      OUTPUT=$(trivy $(params.scan-type) \
        --exit-code $(params.exit-code) \
        --severity $(params.severity) \
        --format $(params.format) \
        "$TARGET")
      
      RESULT=$?
      
      echo "$OUTPUT"
      
      if [ $RESULT -eq 0 ]; then
        echo "No vulnerabilities found" | tee $(results.scan-result.path)
      else
        echo "Vulnerabilities detected" | tee $(results.scan-result.path)
      fi
      
      exit 0
