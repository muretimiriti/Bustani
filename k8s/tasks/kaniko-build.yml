apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: kaniko-build
  namespace: default
spec:
  description: Build and push container image using Kaniko
  params:
  - name: image
    type: string
    description: Container image to build (e.g., myregistry/myimage:tag)
  - name: dockerfile
    type: string
    description: Path to Dockerfile
    default: ./Dockerfile
  - name: context
    type: string
    description: Build context directory
    default: .
  - name: cache
    type: string
    description: Enable caching (true/false)
    default: "true"
  - name: registry-secret
    type: string
    description: Secret with registry credentials
    default: registrycreds
  workspaces:
  - name: source
    description: Source workspace containing Dockerfile and context
  steps:
  - name: build-and-push
    image: gcr.io/kaniko-project/executor:latest
    env:
    - name: DOCKER_CONFIG
      value: /kaniko/.docker
    args:
    - --dockerfile=$(params.dockerfile)
    - --context=$(workspaces.source.path)/$(params.context)
    - --destination=$(params.image)
    - --cache=$(params.cache)
    - --cache-repo=$(params.image)-cache
    volumeMounts:
    - name: kaniko-secret
      mountPath: /kaniko/.docker
  volumes:
  - name: kaniko-secret
    secret:
      secretName: $(params.registry-secret)
      items:
      - key: config.json
        path: config.json
