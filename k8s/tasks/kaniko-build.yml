apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: kaniko-build
  namespace: default
spec:
  description: Build and push container image using Kaniko
  params:
  - name: image
    type: string
    description: Container image to build (e.g., myregistry/myimage:tag)
  - name: dockerfile
    type: string
    description: Path to Dockerfile
    default: ./Dockerfile
  - name: context
    type: string
    description: Build context directory
    default: .
  - name: cache
    type: string
    description: Enable caching (true/false)
    default: "true"
  - name: registry-secret
    type: string
    description: Secret with registry credentials
    default: registrycreds
  workspaces:
  - name: source
    description: Source workspace containing Dockerfile and context
  steps:
  - name: build-and-push
    image: gcr.io/kaniko-project/executor:debug
    env:
    - name: DOCKER_CONFIG
      value: /kaniko/.docker
    script: |
      #!/busybox/sh
      set -eu

      IMAGE="$(params.image)"
      CACHE_REPO="${IMAGE%:*}-cache"
      if [ "$CACHE_REPO" = "$IMAGE" ]; then
        CACHE_REPO="${IMAGE}-cache"
      fi

      /kaniko/executor \
        --dockerfile="$(params.dockerfile)" \
        --context="$(workspaces.source.path)/$(params.context)" \
        --destination="$IMAGE" \
        --cache="$(params.cache)" \
        --cache-repo="$CACHE_REPO"
    volumeMounts:
    - name: kaniko-secret
      mountPath: /kaniko/.docker
  volumes:
  - name: kaniko-secret
    secret:
      secretName: $(params.registry-secret)
      items:
      - key: config.json
        path: config.json
