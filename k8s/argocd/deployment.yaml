apiVersion: apps/v1
kind: Deployment
metadata:
  name: bustani-app
  labels:
    app: bustani
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bustani
  template:
    metadata:
      labels:
        app: bustani
    spec:
      imagePullSecrets:
        - name: docker-registry
      containers:
        - name: bustani
          image: muretimiriti/bustani:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
