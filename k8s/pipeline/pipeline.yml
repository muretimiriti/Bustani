apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: bustani-ci-cd-pipeline
  namespace: default
spec:
  description: "CI/CD Pipeline for Bustani Next.js application"
  params:
  - name: git-repository
    type: string
    description: Git repository URL
  - name: git-revision
    type: string
    description: Git branch or tag
  - name: git-username
    type: string
    description: Git username/owner associated with the repository
  - name: image-name
    type: string
    description: Container image name with registry
  - name: image-tag
    type: string
    description: Container image tag
    default: latest
  - name: trivy-severity
    type: string
    description: Trivy severity levels to report
    default: CRITICAL,HIGH
  - name: namespace
    type: string
    description: Kubernetes namespace for deployment
    default: default
  
  workspaces:
  - name: shared-workspace
    description: Shared workspace for all tasks
  
  tasks:
  # Task 1: Clone Repository
  - name: clone-repo
    taskRef:
      name: git-clone
    params:
    - name: url
      value: $(params.git-repository)
    - name: revision
      value: $(params.git-revision)
    - name: username
      value: $(params.git-username)
    - name: depth
      value: "1"
    workspaces:
    - name: output
      workspace: shared-workspace
  
  # Task 2: Build and Test
  - name: build-app
    runAfter: [clone-repo]
    taskRef:
      name: build-and-test
    params:
    - name: node-version
      value: "20"
    workspaces:
    - name: source
      workspace: shared-workspace
  
  # Task 3: Run Tests
  - name: run-tests
    runAfter: [build-app]
    taskRef:
      name: npm-test
    params:
    - name: node-version
      value: "20"
    - name: test-script
      value: test
    - name: coverage
      value: "false"
    workspaces:
    - name: source
      workspace: shared-workspace
  
  # Task 4: Build and Push Image with Kaniko
  - name: build-image
    runAfter: [run-tests]
    taskRef:
      name: kaniko-build
    params:
    - name: image
      value: $(params.image-name):$(params.image-tag)
    - name: dockerfile
      value: ./Dockerfile
    - name: context
      value: .
    - name: cache
      value: "true"
    - name: registry-secret
      value: registry-credentials
    workspaces:
    - name: source
      workspace: shared-workspace
  
  # Task 5: Scan Image for Vulnerabilities
  - name: scan-image
    runAfter: [build-image]
    taskRef:
      name: trivy-scan
    params:
    - name: image
      value: $(params.image-name):$(params.image-tag)
    - name: scan-type
      value: image
    - name: severity
      value: $(params.trivy-severity)
    - name: format
      value: table
    - name: exit-code
      value: "0"
  
  # Task 6: Deploy to Kubernetes
  - name: deploy-to-k8s
    runAfter: [scan-image]
    taskRef:
      name: kubectl-apply
    params:
    - name: manifestsDir
      value: k8s/
    - name: kubeconfig-secret-name
      value: kubeconfig
    - name: namespace
      value: $(params.namespace)
    workspaces:
    - name: source
      workspace: shared-workspace
