apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-sa
  namespace: default
imagePullSecrets:
- name: docker-registry

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tekton-sa-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: tekton-sa
  namespace: default
